{% extends "base.html" %}
{% block title %}New filament{% endblock %}
{% block content %}
<h1 class="h3 mb-3">New filament</h1>
<form method="post" class="card shadow-sm" id="filamentForm">
  <div class="card-body">
    <div class="row g-3">

      <div class="col-md-6">
        <label class="form-label">Brand / Name</label>
        <select id="brandSelect" class="form-select">
          <option value="">-- select --</option>
          {% for b in brands %}<option value="{{ b }}">{{ b }}</option>{% endfor %}
          <option value="__other__">Other...</option>
        </select>
        <input name="name" id="brandInput" class="form-control mt-1 d-none"
               placeholder="Brand name" autocomplete="off">
      </div>

      <div class="col-md-3">
        <label class="form-label">Material</label>
        <select id="materialSelect" class="form-select">
          <option value="">-- select --</option>
        </select>
        <input name="material" id="materialInput" class="form-control mt-1 d-none"
               placeholder="e.g. PLA Basic" autocomplete="off">
      </div>

      <div class="col-md-3">
        <label class="form-label">Color</label>
        <select id="colorSelect" class="form-select">
          <option value="">-- select --</option>
        </select>
        <input name="color" id="colorInput" class="form-control mt-1 d-none"
               placeholder="e.g. Black" autocomplete="off">
        <div class="mt-1 d-flex align-items-center gap-2">
          <input type="color" id="colorPicker" name="color_hex" value="#808080"
                 class="form-control form-control-color" style="width:3rem"
                 title="Color hex">
          <span class="form-text mb-0" id="colorHint"></span>
        </div>
      </div>

      <div class="col-md-6">
        <label class="form-label">Initial stock (g) <span class="text-muted">(optional)</span></label>
        <input name="stock_g" type="number" step="0.01" min="0" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Purchase price ({{ currency }}/kg) <span class="text-muted">(optional)</span></label>
        <input name="price_per_kg" type="number" step="0.0001" min="0" class="form-control">
      </div>
    </div>
  </div>
  <div class="card-footer d-flex justify-content-between">
    <a href="{{ url_for('main.filaments_list') }}" class="btn btn-link">Cancel</a>
    <button class="btn btn-primary">Create</button>
  </div>
</form>
{% endblock %}
{% block scripts %}
<script>
const DB_BRANDS    = {{ brands | tojson }};
const DB_MATERIALS = {{ materials | tojson }};
let BAMBU = null;

fetch("{{ url_for('static', filename='bambu_colors.json') }}")
  .then(r => r.json())
  .then(data => { BAMBU = data; refreshMaterialSelect(); });

// ── helpers ──────────────────────────────────────────────────────────────────

function resolveAlias(brand) {
  if (!BAMBU) return brand;
  const bL = brand.toLowerCase();
  for (const [a, t] of Object.entries(BAMBU._aliases || {}))
    if (a.toLowerCase() === bL) return t;
  return brand;
}

function bambuMaterials(brand) {
  if (!BAMBU) return [];
  const r = resolveAlias(brand).toLowerCase();
  for (const [k, v] of Object.entries(BAMBU))
    if (!k.startsWith('_') && k.toLowerCase() === r) return Object.keys(v);
  return [];
}

function bambuColors(brand, material) {
  if (!BAMBU) return [];
  const r = resolveAlias(brand).toLowerCase();
  const mL = material.toLowerCase();
  for (const [bk, mats] of Object.entries(BAMBU)) {
    if (bk.startsWith('_') || bk.toLowerCase() !== r) continue;
    for (const [mk, cols] of Object.entries(mats))
      if (mk.toLowerCase() === mL) return Object.entries(cols); // [[name, hex], ...]
  }
  return [];
}

function lookupHex(brand, material, color) {
  const entries = bambuColors(brand, material);
  const cL = color.toLowerCase();
  for (const [n, h] of entries) if (n.toLowerCase() === cL) return h;
  return null;
}

// ── select population ─────────────────────────────────────────────────────────

function populateSelect(sel, options, withOther = true) {
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- select --</option>';
  options.forEach(([val, label]) => {
    const o = document.createElement('option');
    o.value = val; o.textContent = label;
    if (val === cur) o.selected = true;
    sel.appendChild(o);
  });
  if (withOther) {
    const o = document.createElement('option');
    o.value = '__other__'; o.textContent = 'Other...';
    sel.appendChild(o);
  }
}

function refreshMaterialSelect() {
  const brand = activeBrand();
  const bambu = bambuMaterials(brand);
  const merged = [...new Set([...DB_MATERIALS, ...bambu])].sort();
  populateSelect(materialSelect, merged.map(m => [m, m]));
  refreshColorSelect();
}

function refreshColorSelect() {
  const brand    = activeBrand();
  const material = activeMaterial();
  const entries  = bambuColors(brand, material); // [[name, hex]]
  if (entries.length) {
    populateSelect(colorSelect, entries.map(([n, h]) => [n, n]));
    colorSelect.classList.remove('d-none');
    colorInput.classList.add('d-none');
    syncColorPicker();
  } else {
    colorSelect.innerHTML = '<option value="">-- select --</option><option value="__other__">Other...</option>';
    colorSelect.classList.remove('d-none');
    colorInput.classList.add('d-none');
  }
}

// ── active value helpers ──────────────────────────────────────────────────────

function activeBrand()    { return brandInput.classList.contains('d-none')    ? brandSelect.value    : brandInput.value; }
function activeMaterial() { return materialInput.classList.contains('d-none') ? materialSelect.value : materialInput.value; }
function activeColor()    { return colorInput.classList.contains('d-none')    ? colorSelect.value    : colorInput.value; }

// ── "Other..." toggle helpers ─────────────────────────────────────────────────

function toggleOther(sel, inp, onConfirm) {
  if (sel.value === '__other__') {
    inp.classList.remove('d-none');
    inp.focus();
    inp.addEventListener('blur', onConfirm, { once: true });
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); onConfirm(); } }, { once: true });
  }
}

// ── colour picker sync ────────────────────────────────────────────────────────

function syncColorPicker() {
  const brand    = activeBrand();
  const material = activeMaterial();
  const color    = activeColor();
  const hex = lookupHex(brand, material, color);
  const hint = document.getElementById('colorHint');
  if (hex) {
    colorPicker.value = hex;
    hint.textContent = '✓ Bambu color matched';
    hint.className = 'form-text mb-0 text-success';
  } else {
    hint.textContent = '';
  }
}

// ── form submit: ensure hidden inputs carry values ────────────────────────────

document.getElementById('filamentForm').addEventListener('submit', function() {
  // If brand select is active, copy its value into the hidden input that has name="name"
  if (brandInput.classList.contains('d-none')) brandInput.value = brandSelect.value;
  if (materialInput.classList.contains('d-none')) materialInput.value = materialSelect.value;
  if (colorInput.classList.contains('d-none')) colorInput.value = colorSelect.value;
  // Ensure all named inputs are enabled
  brandInput.disabled = false;
  materialInput.disabled = false;
  colorInput.disabled = false;
});

// ── element refs ──────────────────────────────────────────────────────────────

const brandSelect    = document.getElementById('brandSelect');
const brandInput     = document.getElementById('brandInput');
const materialSelect = document.getElementById('materialSelect');
const materialInput  = document.getElementById('materialInput');
const colorSelect    = document.getElementById('colorSelect');
const colorInput     = document.getElementById('colorInput');
const colorPicker    = document.getElementById('colorPicker');

// ── event listeners ───────────────────────────────────────────────────────────

brandSelect.addEventListener('change', function() {
  if (this.value === '__other__') {
    brandInput.classList.remove('d-none');
    brandInput.focus();
    brandInput.addEventListener('input', () => refreshMaterialSelect());
  } else {
    brandInput.classList.add('d-none');
    refreshMaterialSelect();
  }
});

materialSelect.addEventListener('change', function() {
  if (this.value === '__other__') {
    materialInput.classList.remove('d-none');
    materialInput.focus();
    materialInput.addEventListener('input', () => refreshColorSelect());
  } else {
    materialInput.classList.add('d-none');
    refreshColorSelect();
  }
  syncColorPicker();
});

colorSelect.addEventListener('change', function() {
  if (this.value === '__other__') {
    colorInput.classList.remove('d-none');
    colorInput.focus();
    colorInput.addEventListener('input', syncColorPicker);
  } else {
    colorInput.classList.add('d-none');
    syncColorPicker();
  }
});

colorInput.addEventListener('input', syncColorPicker);
colorPicker.addEventListener('input', () => { document.getElementById('colorHint').textContent = ''; });

// init
refreshMaterialSelect();
</script>
{% endblock %}
